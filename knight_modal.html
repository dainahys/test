  /* ── Text ── */
  .text-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 34px;
    z-index: 20;
  }
  .text-area .subtitle {
    font-weight: 600;
    font-size: 28px;
    line-height: 45px;
    text-align: center;
    letter-spacing: -0.02em;
    color: #C5B6FF;
  }
  .text-area .title {
    font-weight: 800;
    font-size: 57px;
    line-height: 69px;
    text-align: center;
    letter-spacing: -2px;
    color: #FFFFFF;
  }

  /* ── Knight shadow ── */
  .knight-shadow {
    position: absolute;
    width: 95px;
    height: 29px;
    left: calc(50% - 49px);
    top: 441px;
    background: linear-gradient(90.74deg, rgba(0,0,0,0) -51.63%, #000 168.93%),
                linear-gradient(90deg, rgba(0,0,0,0) -52.93%, #000 165.89%),
                linear-gradient(90.95deg, rgba(27,0,160,0) 0.59%, #1B00A0 99.19%);
    filter: blur(6.4px);
    z-index: 8;
    animation: shadowFlicker 0.8s step-end infinite;
  }

  /* ── Knight blink layer (UNCHANGED) ── */
  .knight-layer {
    position: absolute;
    width: 115px;
    left: calc(50% - 115px/2 - 5.5px);
    top: 42.14%;
    bottom: 22.73%;
    z-index: 10;
  }
  .knight-layer img {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Rapid blink — step-end for sharp flicker (UNCHANGED) */
  .knight-layer .outline {
    animation: flickerOutline 0.8s step-end infinite;
  }
  .knight-layer .real {
    animation: flickerReal 0.8s step-end infinite;
  }

  @keyframes flickerOutline {
    0%   { opacity: 1; }
    50%  { opacity: 0; }
  }
  @keyframes flickerReal {
    0%   { opacity: 0; }
    50%  { opacity: 1; }
  }
  @keyframes shadowFlicker {
    0%   { opacity: 0.3; }
    50%  { opacity: 0.8; }
  }

  /* ── Noise overlay ── */
  .noise {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    mix-blend-mode: overlay;
    opacity: 0.5;
    z-index: 15;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  /* ── CTA ── */
  .cta-area {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 30px;
    gap: 18.75px;
    position: absolute;
    width: 600px;
    height: 150px;
    left: 0;
    bottom: 0;
    z-index: 20;
  }
  .cta-btn {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 22.5px 30px;
    width: 540px;
    height: 90px;
    background: #693BF2;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .cta-btn:active {
    transform: scale(0.98);
    filter: brightness(0.95);
  }
  .cta-btn .label {
    font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
    font-weight: 600;
    font-size: 30px;
    line-height: 38px;
    color: #FFFFFF;
    text-align: center;
  }

  /* ── Responsive (mobile preview) ── */
  @media (max-width: 640px) {
    .modal {
      width: 100vw;
      height: 100vw;
    }
    .text-area { top: 5.7%; }
    .text-area .subtitle { font-size: 4.67vw; line-height: 7.5vw; }
    .text-area .title { font-size: 9.5vw; line-height: 11.5vw; }
    .cta-area { padding: 5vw; height: 25%; }
    .cta-btn { width: 100%; height: 100%; border-radius: 2.67vw; }
    .cta-btn .label { font-size: 5vw; }
    .knight-shadow { top: 73.5%; }
  }
</style>
</head>
<body>

<div class="modal-overlay">
  <div class="modal">

    <!-- Chess + glow background -->
    <div class="chess-bg"></div>

    <!-- Text -->
    <div class="text-area">
      <div class="subtitle">앱으로 실행해야 소환돼요!</div>
      <div class="title">아직 나이트가<br>없어요</div>
    </div>

    <!-- Knight (blink unchanged) -->
    <div class="knight-shadow"></div>
    <div class="knight-layer">
      <img class="outline" src="images/knight_outline.png" alt="">
      <img class="real" src="images/knight_real.png" alt="">
    </div>

    <!-- Noise overlay -->
    <div class="noise"></div>

    <!-- CTA -->
    <div class="cta-area">
      <button class="cta-btn">
        <span class="label">나이트 소환하기</span>
      </button>
    </div>

  </div>
</div>

</body>
</html>
